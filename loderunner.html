<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lode Runner Remastered</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; touch-action: none; }
        canvas { border: 2px solid #444; background: #000; image-rendering: pixelated; max-width: 100%; }
        .ui { display: flex; width: 100%; max-width: 560px; justify-content: space-between; font-size: 1.2rem; color: #ff0; margin-bottom: 5px; }
        .controls { margin-top: 10px; color: #666; font-size: 0.8rem; text-align: center; }
        #mobile-controls { display: none; margin-top: 10px; width: 100%; max-width: 400px; }
        .dpad-row { display: flex; justify-content: center; gap: 10px; margin: 5px; }
        button { background: #333; color: #fff; border: 1px solid #666; padding: 15px; border-radius: 8px; font-size: 1.2rem; min-width: 60px; touch-action: manipulation; }
        button:active { background: #666; }
        @media (hover: none) { #mobile-controls { display: block; } .controls { display: none; } }
    </style>
</head>
<body>
    <div class="ui">
        <span>SCORE: <span id="score">00000</span></span>
        <span>LEVEL: <span id="level">1</span></span>
        <span>LIVES: <span id="lives">3</span></span>
    </div>
    <canvas id="game" width="560" height="360"></canvas>
    <div class="controls">ARROWS: Move | Z: Dig Left | X: Dig Right</div>
    
    <div id="mobile-controls">
        <div class="dpad-row"><button id="btn-up">↑</button></div>
        <div class="dpad-row">
            <button id="btn-left">←</button>
            <button id="btn-down">↓</button>
            <button id="btn-right">→</button>
        </div>
        <div class="dpad-row" style="margin-top:15px">
            <button id="btn-dig-l" style="color:#f00">Z</button>
            <button id="btn-dig-r" style="color:#f00">X</button>
        </div>
    </div>

<script>
// --- CONFIG & ASSETS ---
const CANVAS = document.getElementById('game');
const CTX = CANVAS.getContext('2d');
const TILE = 20; // 20px tiles
const COLS = 28;
const ROWS = 18; // Smaller vertical size for better focus
const FPS = 30;

// Colors
const C = {
    BG: '#000', BRICK: '#b33', SOLID: '#666', LADDER: '#aa0', ROPE: '#fff', 
    GOLD: '#fd0', HERO: '#0ff', ENEMY: '#f00', HOLE: '#000'
};

// Types
const T = { EMPTY: 0, BRICK: 1, SOLID: 2, LADDER: 3, ROPE: 4, GOLD: 5, TRAP: 9 };

// Game State
let state = {
    level: 1, score: 0, lives: 3, 
    map: [], actors: [], holes: [],
    gameOver: false, won: false
};

// Input
let input = { x: 0, y: 0, digL: false, digR: false };

// --- LEVELS ---
const LEVELS = [
    [ // L1: Basic
        "2222222222222222222222222222",
        "2000000000000000000000000002",
        "2000000000000000000000000002",
        "2000000000000000000000000002",
        "2000000000000000000000000002",
        "2000000000000000000000000002",
        "2000000000000000000000000002",
        "2000000000000000000000000002",
        "2000000000000000000000000002",
        "2000000000000000000000000002",
        "2000000000000000000000000002",
        "2111111111113331111111111112",
        "2000000000003330000000000002",
        "2333333333333333333333333332",
        "2000000000003330000500000002",
        "2111111111111111111111111112",
        "2333333333333333333333333332",
        "2222222222222222222222222222"
    ],
    [ // L2: The Pit
        "2222222222222222222222222222",
        "2000000000000000000000000002",
        "2000000000000000000000000002",
        "2000000000000000000000000002",
        "2000000000000000000000000002",
        "2000000000000000000000000002",
        "2000000000000000000000000002",
        "2000000000000000000000000002",
        "2000000000000000000000000002",
        "2000000000000000000000000002",
        "2111111111111111111111111112",
        "2100000000000000000000000012",
        "2105000000000000000000005012",
        "2111111111113331111111111112",
        "2000000000003330000000000002",
        "2111111111113331111111111112",
        "2333333333333333333333333332",
        "2222222222222222222222222222"
    ]
];

// --- CORE ---
class Actor {
    constructor(x, y, type) {
        this.x = x; // Grid coords
        this.y = y;
        this.pixelX = x * TILE; // Pixel coords for smooth movement
        this.pixelY = y * TILE;
        this.type = type; // 'hero' or 'enemy'
        this.state = 'stand'; // stand, walk, fall, climb
        this.dir = 1; // 1 = right, -1 = left
        this.speed = type === 'hero' ? 4 : 2; 
    }

    update() {
        // Simple physics: Move towards target grid
        let targetPX = this.x * TILE;
        let targetPY = this.y * TILE;

        if (this.pixelX < targetPX) this.pixelX = Math.min(this.pixelX + this.speed, targetPX);
        if (this.pixelX > targetPX) this.pixelX = Math.max(this.pixelX - this.speed, targetPX);
        if (this.pixelY < targetPY) this.pixelY = Math.min(this.pixelY + this.speed, targetPY);
        if (this.pixelY > targetPY) this.pixelY = Math.max(this.pixelY - this.speed, targetPY);

        const moving = this.pixelX !== targetPX || this.pixelY !== targetPY;
        if (moving) return; // Busy moving, wait till aligned

        // --- LOGIC (Only when grid aligned) ---
        
        // 1. Fall?
        const tileHere = getMap(this.x, this.y);
        const tileBelow = getMap(this.x, this.y + 1);
        
        // Can stand if: Solid/Brick/Ladder below OR holding Rope/Ladder here
        const canStand = isSolid(this.x, this.y+1) || tileBelow === T.LADDER || tileHere === T.LADDER || tileHere === T.ROPE || (this.type === 'enemy' && tileHere === T.SOLID); // Enemy can stand in enemy-spawn (solid)? Nah simple.

        if (!canStand) {
            this.state = 'fall';
            this.y++;
            return;
        }

        // 2. Input / AI
        let dx = 0, dy = 0;
        let wantDigL = false, wantDigR = false;

        if (this.type === 'hero') {
            dx = input.x;
            dy = input.y;
            wantDigL = input.digL;
            wantDigR = input.digR;
            input.digL = false; input.digR = false; // consume click
        } else {
            // Simple AI: Move to hero
            const hero = state.actors[0];
            if (hero.y === this.y) dx = (hero.x > this.x) ? 1 : -1;
            else if (hero.y < this.y && tileHere === T.LADDER) dy = -1;
            else if (hero.y > this.y && (tileBelow === T.LADDER || tileBelow === T.EMPTY)) dy = 1;
            else dx = (hero.x > this.x) ? 1 : -1;
            
            // Don't overlap other enemies
            if (Math.random() < 0.1) dx = 0; // hesitate
        }

        // 3. Action
        if (wantDigL) this.dig(-1);
        else if (wantDigR) this.dig(1);
        
        else if (dy !== 0) { // Vertical
            // Climb UP: Must be on Ladder
            if (dy === -1 && tileHere === T.LADDER) {
                this.y--;
                this.state = 'climb';
            }
            // Climb DOWN: Must be on Ladder OR Ladder below OR Empty below (fall start)
            else if (dy === 1) {
                if (tileBelow === T.LADDER || tileHere === T.LADDER) {
                    this.y++;
                    this.state = 'climb';
                } else if (!isSolid(this.x, this.y + 1)) {
                    // Step off edge
                    this.y++;
                    this.state = 'fall';
                }
            }
        } 
        else if (dx !== 0) { // Horizontal
            const nextX = this.x + dx;
            if (!isSolid(nextX, this.y)) {
                this.x += dx;
                this.dir = dx;
                this.state = tileHere === T.ROPE ? 'hang' : 'walk';
            }
        } else {
            this.state = 'stand';
        }

        // 4. Interaction
        if (this.type === 'hero') {
            if (getMap(this.x, this.y) === T.GOLD) {
                setMap(this.x, this.y, T.EMPTY);
                state.score += 100;
                checkWin();
            }
            // Die?
            state.actors.slice(1).forEach(en => {
                if (Math.abs(en.pixelX - this.pixelX) < 10 && Math.abs(en.pixelY - this.pixelY) < 10) {
                    die();
                }
            });
        }
    }

    dig(dir) {
        if (this.type !== 'hero') return;
        // Rules: Must stand on solid, target must be brick, space above target must be empty
        const tileBelow = getMap(this.x, this.y + 1);
        if (!isSolid(this.x, this.y + 1) && tileBelow !== T.LADDER) return; // Must have footing

        const tx = this.x + dir;
        const ty = this.y + 1;
        
        if (getMap(tx, ty) === T.BRICK && getMap(tx, this.y) !== T.BRICK && getMap(tx, this.y) !== T.SOLID) {
            // Dig it
            setMap(tx, ty, T.EMPTY);
            state.holes.push({ x: tx, y: ty, time: 150 }); // 5 sec
        }
    }

    draw() {
        CTX.fillStyle = this.type === 'hero' ? C.HERO : C.ENEMY;
        CTX.fillRect(this.pixelX + 4, this.pixelY + 2, 12, 16);
        // Face
        CTX.fillStyle = '#fff';
        if (this.dir === 1) CTX.fillRect(this.pixelX + 10, this.pixelY + 4, 4, 4);
        else CTX.fillRect(this.pixelX + 6, this.pixelY + 4, 4, 4);
    }
}

// --- ENGINE ---
function getMap(x, y) {
    if (x < 0 || x >= COLS || y < 0 || y >= ROWS) return T.SOLID;
    return state.map[y][x];
}
function setMap(x, y, v) {
    if (x >= 0 && x < COLS && y >= 0 && y < ROWS) state.map[y][x] = v;
}
function isSolid(x, y) {
    const t = getMap(x, y);
    return t === T.BRICK || t === T.SOLID;
}

function initLevel(idx) {
    state.map = [];
    state.actors = []; // 0 is hero
    state.holes = [];
    
    // Parse map
    const layout = LEVELS[idx % LEVELS.length];
    for (let y = 0; y < ROWS; y++) {
        const row = [];
        const chars = (layout[y] || "2".repeat(COLS)).split('');
        for (let x = 0; x < COLS; x++) {
            const val = parseInt(chars[x] || 0);
            row.push(val);
        }
        state.map.push(row);
    }

    // Spawn Hero (find first safe spot)
    state.actors.push(new Actor(2, 11, 'hero'));
    // Spawn Enemies
    state.actors.push(new Actor(15, 2, 'enemy'));
    state.actors.push(new Actor(20, 2, 'enemy'));

    updateUI();
}

function updateUI() {
    document.getElementById('score').innerText = state.score.toString().padStart(5, '0');
    document.getElementById('lives').innerText = state.lives;
    document.getElementById('level').innerText = state.level;
}

function die() {
    state.lives--;
    updateUI();
    if (state.lives <= 0) {
        alert("GAME OVER");
        state.score = 0;
        state.lives = 3;
        state.level = 1;
        initLevel(0);
    } else {
        // Respawn hero
        const hero = state.actors[0];
        hero.x = 2; hero.y = 11;
        hero.pixelX = hero.x * TILE; hero.pixelY = hero.y * TILE;
    }
}

function checkWin() {
    // Check if gold left
    let goldLeft = false;
    for(let y=0; y<ROWS; y++) for(let x=0; x<COLS; x++) if(state.map[y][x] === T.GOLD) goldLeft = true;
    
    if (!goldLeft) {
        alert("LEVEL COMPLETE!");
        state.level++;
        initLevel(state.level - 1);
    }
}

function tick() {
    // 1. Update Holes
    state.holes = state.holes.filter(h => {
        h.time--;
        if (h.time <= 0) {
            setMap(h.x, h.y, T.BRICK); // Fill hole
            // Kill anyone inside
            state.actors.forEach(a => {
                if (Math.round(a.x) === h.x && Math.round(a.y) === h.y) die(); 
            });
            return false;
        }
        return true;
    });

    // 2. Update Actors
    state.actors.forEach(a => a.update());

    // 3. Draw
    CTX.fillStyle = '#000';
    CTX.fillRect(0, 0, CANVAS.width, CANVAS.height);

    for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
            const t = state.map[y][x];
            const px = x * TILE, py = y * TILE;
            if (t === T.BRICK) {
                CTX.fillStyle = C.BRICK; CTX.fillRect(px, py, TILE, TILE);
                CTX.fillStyle = '#d66'; CTX.fillRect(px+2, py+2, TILE-4, TILE-4); // detail
            }
            else if (t === T.SOLID) { CTX.fillStyle = C.SOLID; CTX.fillRect(px, py, TILE, TILE); }
            else if (t === T.LADDER) {
                CTX.fillStyle = C.LADDER;
                CTX.fillRect(px+4, py, 2, TILE); CTX.fillRect(px+14, py, 2, TILE);
                for(let i=2; i<TILE; i+=4) CTX.fillRect(px+4, py+i, 12, 2);
            }
            else if (t === T.ROPE) { CTX.fillStyle = C.ROPE; CTX.fillRect(px, py+4, TILE, 2); }
            else if (t === T.GOLD) {
                CTX.fillStyle = C.GOLD;
                CTX.beginPath(); CTX.arc(px+10, py+12, 6, 0, Math.PI*2); CTX.fill();
            }
        }
    }

    // Draw Holes (black squares over bg)
    state.holes.forEach(h => {
        CTX.fillStyle = '#000'; // Hole bg
        CTX.fillRect(h.x*TILE, h.y*TILE, TILE, TILE);
        CTX.strokeStyle = '#444'; // Top outline
        CTX.beginPath(); CTX.moveTo(h.x*TILE, h.y*TILE); CTX.lineTo(h.x*TILE+TILE, h.y*TILE); CTX.stroke();
    });

    state.actors.forEach(a => a.draw());
}

// --- IO ---
window.addEventListener('keydown', e => {
    if (['ArrowLeft','a','A'].includes(e.key)) input.x = -1;
    if (['ArrowRight','d','D'].includes(e.key)) input.x = 1;
    if (['ArrowUp','w','W'].includes(e.key)) input.y = -1;
    if (['ArrowDown','s','S'].includes(e.key)) input.y = 1;
    if (['z','Z'].includes(e.key)) input.digL = true;
    if (['x','X'].includes(e.key)) input.digR = true;
    // e.preventDefault();
});
window.addEventListener('keyup', e => {
    if (['ArrowLeft','a','ArrowRight','d','A','D'].includes(e.key)) input.x = 0;
    if (['ArrowUp','w','ArrowDown','s','W','S'].includes(e.key)) input.y = 0;
});

// Touch
const bindBtn = (id, actionStart, actionEnd) => {
    const btn = document.getElementById(id);
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); actionStart(); });
    btn.addEventListener('touchend', (e) => { e.preventDefault(); actionEnd(); });
    btn.addEventListener('mousedown', (e) => { actionStart(); });
    btn.addEventListener('mouseup', (e) => { actionEnd(); });
};
bindBtn('btn-left', () => input.x = -1, () => input.x = 0);
bindBtn('btn-right', () => input.x = 1, () => input.x = 0);
bindBtn('btn-up', () => input.y = -1, () => input.y = 0);
bindBtn('btn-down', () => input.y = 1, () => input.y = 0);
bindBtn('btn-dig-l', () => input.digL = true, () => input.digL = false);
bindBtn('btn-dig-r', () => input.digR = true, () => input.digR = false);

// Loop
initLevel(0);
setInterval(tick, 1000/FPS);

</script>
</body>
</html>
